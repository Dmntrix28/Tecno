<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pokementrix ⚡</title>
    <link rel="icon" href="https://raw.githubusercontent.com/PokeAPI/sprites/master/sprites/items/poke-ball.png">
    <link rel="stylesheet" href="css/styles.css" />
  </head>

  <body data-page="lista">
    <div class="aurora"></div>

    <header class="topbar glass">
      <h1>Pokementrix ⚡</h1>
      <nav>
        <a href="index.html" class="nav-link">Inicio</a>
        <a href="lista.html" class="nav-link active">Lista</a>
      </nav>
    </header>

    <main class="container">
      <section class="section-head">
        <h2>Pokédex interactiva</h2>

        <div class="actions-row">

          <input
            id="searchInput"
            type="search"
            placeholder="Buscar Pokémon..."
            aria-label="Buscar Pokémon"
          />

          <!-- BOTONES -->
          <button id="reloadBtn" class="btn">Recargar</button>
          <button id="sortBtn" class="btn">Ordenar A-Z</button>

        </div>
      </section>

      <div id="status" class="status">Cargando datos...</div>

      <!-- GRID DE POKEMON -->
      <section id="pokemonGrid" class="grid"></section>

      <!-- PAGINACIÓN -->
      <div id="pagination" class="pagination"></div>
    </main>

    <script src="js/api.js" defer></script>
    <script src="js/navigation.js" defer></script>
    <script src="js/app.js" defer></script>
  </body>
</html>
